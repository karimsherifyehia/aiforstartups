[build]
  command = "cd nexus-landing && npm install && node ./node_modules/astro/astro.js build"
  publish = "nexus-landing/dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/screenshots/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/app"
  to = "https://nexus.aiforstartups.io"
  status = 302

[[redirects]]
  from = "/docs"
  to = "https://nexus-docs.aiforstartups.io"
  status = 302
